name: compile

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.11

      - name: Install semgrep
        run: pip install semgrep

      - name: Sync dependencies
        run: uv sync

      - name: Compile rules from specs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SRCOMPILE_MODEL: ${{ vars.SRCOMPILE_MODEL }}
        run: uv run srcompile build ./specs

      - name: Open PR with regenerated rules
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: Recompile rules from specs
          title: Recompile rules
          body: |
            Regenerated `rules/` by running `srcompile build ./specs`.

            Each rule passed the four gates: YAML parse, `semgrep --validate`,
            flags `bad.py`, passes `good.py`. Review before merge. Not auto-merged.
          branch: recompile-rules
          delete-branch: true
          add-paths: rules/
