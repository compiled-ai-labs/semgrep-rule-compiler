rules:
  - id: no-secrets-in-logs
    languages: [python]
    severity: ERROR
    message: Never pass secrets or personal identifiers (tokens, passwords, API keys, session IDs, emails, phone numbers, national IDs) to a logging call, in the message or in any argument. Log presence or a non-reversible fingerprint instead.
    patterns:
      - pattern-either:
          - pattern: $LOG.debug(..., f"...{$SECRET}...", ...)
          - pattern: $LOG.info(..., f"...{$SECRET}...", ...)
          - pattern: $LOG.warning(..., f"...{$SECRET}...", ...)
          - pattern: $LOG.warn(..., f"...{$SECRET}...", ...)
          - pattern: $LOG.error(..., f"...{$SECRET}...", ...)
          - pattern: $LOG.critical(..., f"...{$SECRET}...", ...)
          - pattern: $LOG.exception(..., f"...{$SECRET}...", ...)
          - pattern: $LOG.log(..., f"...{$SECRET}...", ...)
          - pattern: logging.debug(..., f"...{$SECRET}...", ...)
          - pattern: logging.info(..., f"...{$SECRET}...", ...)
          - pattern: logging.warning(..., f"...{$SECRET}...", ...)
          - pattern: logging.error(..., f"...{$SECRET}...", ...)
          - pattern: logging.critical(..., f"...{$SECRET}...", ...)
          - pattern: logging.exception(..., f"...{$SECRET}...", ...)
      - metavariable-pattern:
          metavariable: $SECRET
          patterns:
            - pattern-either:
                - pattern: $TOKEN
                - pattern: $OBJ.$ATTR
      - metavariable-regex:
          metavariable: $SECRET
          regex: (?i)(token|secret|password|passwd|pwd|api_?key|apikey|session|auth|credential|email|phone|ssn|national_?id|card)
